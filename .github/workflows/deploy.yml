name: Deploy to Firebase Hosting

on:
  push:
    branches: [main]
    paths:
      - 'flutter/**'
      - '.github/workflows/deploy.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: 'stable'
          cache: true

      - name: Restore Firebase config
        working-directory: flutter
        env:
          FIREBASE_OPTIONS: ${{ secrets.FIREBASE_OPTIONS_DART }}
          FCM_SERVICE_WORKER: ${{ secrets.FCM_SERVICE_WORKER_JS }}
        run: |
          echo "$FIREBASE_OPTIONS" > lib/firebase_options.dart
          echo "$FCM_SERVICE_WORKER" > web/firebase-messaging-sw.js

      - name: Install dependencies
        working-directory: flutter
        run: flutter pub get

      - name: Build web
        working-directory: flutter
        run: flutter build web --release

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: gpizza-firebase
          channelId: live
          entryPoint: flutter
